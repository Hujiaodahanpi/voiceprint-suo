<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>净声盾 · 智能声纹门锁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f5f7fa 0%, #e8ecf2 100%);
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.05);
            padding: 40px 32px;
            transition: transform 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.12);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .system-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #2d3a5e 0%, #3b5bdb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .system-subtitle {
            font-size: 14px;
            color: #6c7a89;
            font-weight: 400;
        }

        .welcome-text {
            font-size: 20px;
            font-weight: 600;
            color: #2d3a5e;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .welcome-text::before {
            content: "🔐";
            font-size: 22px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #4a5a6e;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1.5px solid #e0e5eb;
            border-radius: 14px;
            background: #fafbfc;
            transition: all 0.25s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #3b5bdb;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 91, 219, 0.08);
        }

        .input-group input::placeholder {
            color: #aab7c4;
            font-weight: 400;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #3b5bdb 0%, #2d3a5e 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(59, 91, 219, 0.25);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 91, 219, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .footer-note {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #9aabbb;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .footer-note span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(59, 91, 219, 0.08);
            padding: 4px 12px;
            border-radius: 30px;
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 4px solid #b91c1c;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }
            .system-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <div class="logo-icon">🚪🔊</div>
            <div class="system-title">净声盾</div>
            <div class="system-subtitle">智能声纹门锁 · 管理平台</div>
        </div>

        <div class="welcome-text">
            管理员登录
        </div>

        {% if error %}
        <div class="error-message">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/">
            <div class="input-group">
                <label>👤 用户名</label>
                <input type="text" name="username" placeholder="请输入管理员账号" value="{{ username or '' }}" required autofocus>
            </div>
            <div class="input-group">
                <label>🔑 密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn">身份验证 · 进入系统</button>
        </form>

        <div class="footer-note">
            <span>🔒 声纹加密 · 本地认证</span>
        </div>
    </div>
</body>
</html>
